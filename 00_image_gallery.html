<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>画像一覧</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      min-height: 100vh;
    }

    /* === Sidebar === */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      overflow-y: auto;
      transition: transform 0.3s ease;
      z-index: 50;
      padding: 15px 0;
    }
    .sidebar.collapsed {
      transform: translateX(-220px);
    }
    .sidebar-toggle {
      position: fixed;
      top: 12px;
      left: 220px;
      z-index: 55;
      background: #1a1a2e;
      color: #eee;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 0 6px 6px 0;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: left 0.3s ease;
    }
    .sidebar.collapsed + .sidebar-toggle {
      left: 0;
    }
    .sidebar-group-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      padding: 12px 16px 6px;
      margin-top: 8px;
    }
    .sidebar-item {
      display: block;
      padding: 8px 16px;
      color: #ccc;
      text-decoration: none;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .sidebar-item:hover {
      background: #16213e;
      color: #fff;
    }
    .sidebar-item.active {
      background: #0f3460;
      color: #fff;
      border-left: 3px solid #e94560;
    }
    .sidebar-item .badge {
      font-size: 10px;
      color: #888;
      margin-left: 4px;
    }

    /* === Main Content === */
    .main-content {
      flex: 1;
      margin-left: 220px;
      transition: margin-left 0.3s ease;
      padding: 0 20px 40px;
    }
    .main-content.expanded {
      margin-left: 0;
    }

    /* === Search === */
    .search-container {
      background: #fff;
      padding: 8px 16px 6px;
      border-bottom: 1px solid #eee;
      margin-bottom: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 4px;
    }
    .search-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .search-input-wrapper {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 550px;
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb, #f5576c);
      padding: 3px;
      border-radius: 50px;
    }
    .search-input-wrapper::before {
      content: '\1F50D';
      position: absolute;
      left: 21px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      z-index: 1;
      opacity: 0.6;
    }
    #imageSearchInput {
      width: 100%;
      padding: 14px 50px 14px 50px;
      font-size: 16px;
      font-family: inherit;
      border: none;
      border-radius: 50px;
      outline: none;
      background: #fff;
      transition: all 0.3s ease;
    }
    #imageSearchInput::placeholder { color: #888; }
    #imageSearchInput:focus { background: #fafafa; }
    #searchClearBtn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
      border: none;
      font-size: 14px;
      color: #fff;
      cursor: pointer;
      width: 26px;
      height: 26px;
      line-height: 26px;
      text-align: center;
      border-radius: 50%;
      display: none;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(238, 90, 90, 0.4);
    }
    #searchClearBtn:hover {
      background: linear-gradient(135deg, #ff5252, #e53935);
      transform: translateY(-50%) scale(1.1);
    }
    #searchResultInfo {
      font-size: 14px;
      color: #444;
      min-height: 1em;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 2px;
    }
    #searchResultInfo:empty { display: none; }
    #searchResultInfo .result-count {
      color: #667eea;
      font-weight: 700;
      font-size: 16px;
    }
    #searchResultInfo .result-label { color: #555; }
    #openSearchFlatBtn {
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb, #f5576c);
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(118, 75, 162, 0.3);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    #openSearchFlatBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(118, 75, 162, 0.45);
    }

    /* === Accordion === */
    .accordion {
      background-color: #eee;
      color: #444;
      cursor: pointer;
      padding: 18px;
      width: 100%;
      border: none;
      text-align: left;
      outline: none;
      font-size: 18px;
      font-weight: bold;
      transition: 0.4s;
      margin-top: 5px;
    }
    .active, .accordion:hover {
      background-color: #ffffe0;
    }
    .accordion .section-info {
      font-size: 13px;
      font-weight: normal;
      color: #888;
      margin-left: 12px;
    }

    /* === Panel === */
    .panel {
      padding: 0 18px;
      display: none;
      background-color: white;
      overflow: hidden;
    }
    .panel-loading {
      padding: 20px;
      text-align: center;
      color: #888;
    }

    /* === Image Grid === */
    .image-row {
      display: flex;
      width: 100%;
      margin-bottom: 5px;
    }
    .image-row .thumb {
      flex: 0 0 20%;
      width: 20%;
      padding: 2px;
      position: relative;
      box-sizing: border-box;
    }
    .image-row .thumb img {
      width: 100%;
      height: auto;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.2s;
      display: block;
    }
    .image-row .thumb:hover img {
      transform: scale(1.05);
    }
    .image-row.hidden { display: none; }
    .image-row .thumb.hidden { display: none; }
    /* サムネ下の商品名・事業者キャプション */
    .thumb-caption {
      padding: 2px 3px 0;
      overflow: hidden;
    }
    .thumb-caption .tc-name {
      display: block;
      font-size: 11px;
      line-height: 1.3;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .thumb-caption .tc-vendor {
      display: block;
      font-size: 10px;
      line-height: 1.3;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .panel.search-active { display: block !important; }
    .accordion.search-active { background-color: #ffffe0; }

    /* === Stock Button (on each thumb) === */
    .stock-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      min-width: 28px;
      min-height: 28px;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: rgba(255, 255, 255, 0.25);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      z-index: 2;
      opacity: 1;
      transition: background 0.2s, color 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .image-row .thumb:hover .stock-btn {
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      transform: scale(1.05);
    }
    .image-row .thumb.stocked {
      box-shadow: inset 0 0 0 3px #ffb300;
    }
    .image-row .thumb.stocked .stock-btn {
      background: #ffb300;
      color: #000;
    }

    /* === Stock Counter Button (bottom-right fixed) === */
    #stockCounterBtn {
      position: fixed;
      bottom: 20px;
      right: 30px;
      z-index: 99;
      padding: 0 16px;
      height: 50px;
      min-width: 120px;
      font-size: 14px;
      font-weight: bold;
      border: none;
      outline: none;
      background-color: #ffb300;
      color: #000;
      cursor: pointer;
      border-radius: 25px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      transition: background-color 0.2s, transform 0.15s;
    }
    #stockCounterBtn:hover {
      background-color: #ffa000;
      transform: translateY(-2px);
    }
    #stockCounterBtn.empty {
      background-color: #bbb;
      color: #fff;
    }

    /* === Stock Overlay === */
    #stockOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20, 20, 30, 0.96);
      z-index: 90;
      flex-direction: column;
    }
    #stockOverlay.open { display: flex; }
    .stock-overlay-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: #1a1a2e;
      color: #fff;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    .stock-overlay-title {
      font-size: 16px;
      font-weight: bold;
      flex: 1;
    }
    .stock-overlay-header button {
      padding: 8px 16px;
      font-size: 13px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #2a2a40;
      color: #eee;
      cursor: pointer;
      transition: background 0.2s;
    }
    .stock-overlay-header button:hover {
      background: #3a3a55;
    }
    .stock-overlay-header .select-mode-btn {
      background: #e67e22;
      border-color: #e67e22;
      color: #fff;
    }
    .stock-overlay-header .select-mode-btn:hover { background: #ca6f1e; }
    .stock-overlay-header .clear-all-btn {
      background: #c0392b;
      border-color: #c0392b;
      color: #fff;
    }
    .stock-overlay-header .clear-all-btn:hover { background: #a93226; }
    .stock-overlay-header .execute-remove-btn {
      background: #c0392b;
      border-color: #c0392b;
      color: #fff;
      display: none;
    }
    .stock-overlay-header .execute-remove-btn:hover { background: #a93226; }
    .stock-overlay-header .cancel-select-btn {
      background: #555;
      border-color: #555;
      color: #eee;
      display: none;
    }
    .stock-overlay-header .cancel-select-btn:hover { background: #666; }

    /* 解除モード中のヘッダー切り替え */
    #stockOverlay.selecting .select-mode-btn,
    #stockOverlay.selecting .clear-all-btn,
    #stockOverlay.selecting .download-btn { display: none; }
    #stockOverlay.selecting .execute-remove-btn,
    #stockOverlay.selecting .cancel-select-btn { display: flex; }

    /* 解除モード中のグリッド */
    #stockOverlay.selecting .stock-cell { cursor: pointer; }
    #stockOverlay.selecting .stock-cell .stock-btn { display: none; }
    .stock-cell.selected { outline: 3px solid #3498db; }
    .stock-cell.selected::after {
      content: '✓';
      position: absolute;
      top: 6px;
      right: 8px;
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 0 0 5px rgba(0,0,0,0.9);
      pointer-events: none;
    }
    .stock-overlay-header .download-btn {
      background: #2980b9;
      border-color: #2980b9;
      color: #fff;
    }
    .stock-overlay-header .download-btn:hover {
      background: #2471a3;
    }
    .stock-overlay-header .download-btn:disabled {
      background: #555;
      border-color: #555;
      cursor: default;
    }
    .stock-overlay-header .close-btn {
      font-size: 18px;
      padding: 6px 14px;
    }
    .stock-overlay-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .stock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .stock-cell {
      position: relative;
      background: #2a2a40;
      border-radius: 4px;
      overflow: hidden;
    }
    .stock-cell img {
      width: 100%;
      height: auto;
      display: block;
      cursor: pointer;
    }
    .stock-cell.stocked { outline: 3px solid #ffb300; }
    .stock-cell.stocked .stock-btn {
      background: #ffb300;
      color: #000;
      opacity: 1;
    }
    .stock-empty {
      text-align: center;
      color: #aaa;
      padding: 60px 20px;
      font-size: 14px;
    }
    .stock-cell-caption {
      font-size: 11px;
      color: #ccc;
      padding: 4px 6px;
      word-break: break-all;
    }

    /* === Modal Image Wrapper (hover stock button) === */
    #modalImageWrapper {
      position: relative;
      display: inline-block;
      line-height: 0;
    }
    #modalHoverStockBtn {
      position: absolute;
      top: 10px;
      right: 10px;
      min-width: 36px;
      min-height: 36px;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      color: rgba(255, 255, 255, 0.25);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s, color 0.2s, transform 0.15s;
      z-index: 2;
    }
    #modalImageWrapper:hover #modalHoverStockBtn {
      opacity: 1;
      color: #fff;
    }
    #modalHoverStockBtn:hover {
      transform: scale(1.1);
    }
    #modalHoverStockBtn.stocked {
      opacity: 1;
      background: #ffb300;
      color: #000;
    }

    /* === Modal Stock Toggle Button === */
    #modalStockBtn {
      padding: 5px 12px;
      font-size: 14px;
      cursor: pointer;
      background-color: #f1f1f1;
      border: none;
      border-radius: 3px;
      color: #333;
      margin: 5px;
    }
    #modalStockBtn:hover { background-color: #ddd; }
    #modalStockBtn.stocked {
      background-color: #ffb300;
      color: #000;
    }
    #viewSiblingSetBtn {
      padding: 5px 12px;
      font-size: 14px;
      cursor: pointer;
      background-color: #f1f1f1;
      border: none;
      border-radius: 3px;
      color: #333;
      margin: 5px;
    }
    #viewSiblingSetBtn:hover { background-color: #ddd; }
    #viewSiblingSetBtn:disabled { color: #aaa; cursor: default; background: #f5f5f5; }
    /* 楽天ページリンク（モーダル） */
    #rakutenLinkBtn {
      padding: 5px 12px;
      font-size: 14px;
      cursor: pointer;
      background-color: #bf0000;
      border: none;
      border-radius: 3px;
      color: #fff;
      margin: 5px;
      text-decoration: none;
      display: inline-block;
    }
    #rakutenLinkBtn:hover { background-color: #a00000; }
    /* モーダルのキャプション内訳（商品名・事業者・ファイル名） */
    #caption .cap-name { font-weight: bold; color: #fff; margin-right: 10px; }
    #caption .cap-vendor { color: #ccc; margin-right: 10px; }
    #caption .cap-file { color: #888; font-size: 12px; }
    /* 同じ事業者を見るボタン（モーダル） */
    #viewVendorBtn {
      padding: 5px 12px;
      font-size: 14px;
      cursor: pointer;
      background-color: #2a5db0;
      border: none;
      border-radius: 3px;
      color: #fff;
      margin: 5px;
    }
    #viewVendorBtn:hover { background-color: #224d92; }
    /* サイドバー「事業者別」項目（長い名前は省略表示） */
    .sidebar-item.sidebar-vendor {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* === Set-View Mode (新タブのセット一覧) === */
    #setViewHeader {
      padding: 14px 20px;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    #setViewHeader strong { font-size: 16px; }
    #setViewHeader .close-tab-btn {
      padding: 6px 14px;
      background: #2a2a40;
      border: 1px solid #555;
      color: #eee;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    #setViewHeader .close-tab-btn:hover { background: #3a3a55; }
    body.set-view .sidebar,
    body.set-view .sidebar-toggle,
    body.set-view .search-container,
    body.set-view #scrollTopBtn,
    body.set-view #stockCounterBtn,
    body.set-view #stockOverlay { display: none !important; }
    body.set-view .stock-btn,
    body.set-view #modalStockBtn,
    body.set-view #modalHoverStockBtn,
    body.set-view #viewSiblingSetBtn,
    body.set-view #rakutenLinkBtn,
    body.set-view #viewVendorBtn { display: none !important; }
    body.set-view .main-content { margin-left: 0 !important; }
    #set-view-panel .image-row { flex-wrap: wrap; }

    /* === Modal === */
    .modal {
      display: none;
      position: fixed;
      z-index: 100;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      align-items: center;
      justify-content: center;
    }
    .modal-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      display: block;
      max-width: calc(100vw - 40px);
      max-height: calc(100vh - 120px);
      width: auto;
      height: auto;
    }
    #caption-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 15px;
      gap: 10px;
      flex-wrap: wrap;
    }
    #caption {
      color: #ccc;
      font-size: 18px;
      margin: 5px;
    }
    #caption-container button {
      padding: 5px 10px;
      font-size: 14px;
      cursor: pointer;
      background-color: #f1f1f1;
      border: none;
      border-radius: 3px;
      color: #333;
      margin: 5px;
    }
    #caption-container button:hover { background-color: #ddd; }
    .close {
      position: absolute;
      top: 15px;
      right: 35px;
      color: #f1f1f1;
      font-size: 40px;
      font-weight: bold;
      transition: 0.3s;
      cursor: pointer;
    }

    /* === Scroll Top Button === */
    #scrollTopBtn {
      display: none;
      position: fixed;
      bottom: 80px;
      right: 30px;
      z-index: 99;
      font-size: 20px;
      font-weight: bold;
      border: none;
      outline: none;
      background-color: #007bff;
      color: white;
      cursor: pointer;
      width: 50px;
      height: 50px;
      padding: 0;
      border-radius: 50%;
      line-height: 50px;
      text-align: center;
      opacity: 0.9;
      transition: opacity 0.3s, background-color 0.3s;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
    }
    #scrollTopBtn:hover {
      background-color: #0056b3;
      opacity: 1;
    }

    /* === Modal Nav Buttons === */
    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: none;
      font-size: 28px;
      width: 48px;
      height: 64px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s;
      z-index: 101;
      line-height: 1;
    }
    .modal-nav:hover { background: rgba(255,255,255,0.3); }
    .modal-nav:disabled { opacity: 0.2; cursor: default; }
    .modal-prev { left: 12px; }
    .modal-next { right: 12px; }

    /* === AND/OR Search Mode Toggle === */
    .search-mode-toggle { display: flex; gap: 2px; flex-shrink: 0; }
    .search-mode-btn {
      padding: 4px 10px;
      font-size: 12px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      color: #555;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s, color 0.2s;
    }
    .search-mode-btn.active { background: #0f3460; color: #fff; border-color: #0f3460; }
    .search-mode-btn:not(.active):hover { background: #e0e0e0; }

    /* === Section Filter Bar (inside search result overlay) === */
    #sectionFilterBar {
      display: none;
      padding: 8px 16px;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      background: #16213e;
      border-bottom: 1px solid #2a2a50;
      flex-shrink: 0;
    }
    #sectionFilterBar.visible { display: flex; }
    .section-filter-chip {
      padding: 3px 10px;
      font-size: 12px;
      border: 1px solid #444;
      border-radius: 12px;
      background: #2a2a40;
      color: #ccc;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .section-filter-chip.active { background: #3498db; color: #fff; border-color: #3498db; }
    .section-filter-chip:not(.active):hover { background: #3a3a55; color: #fff; }

    /* === 事業者ドロップダウン（検索結果オーバーレイ内） === */
    #vendorFilterBar {
      display: none;
      padding: 6px 16px;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      background: #16213e;
      border-bottom: 1px solid #2a2a50;
      flex-shrink: 0;
    }
    #vendorFilterBar.visible { display: flex; }
    .vfilter-label { color: #888; font-size: 12px; flex-shrink: 0; }
    .vendor-dd { position: relative; }
    .vendor-dd > summary {
      list-style: none; cursor: pointer; padding: 4px 12px;
      background: #2a2a40; color: #eee; border: 1px solid #444; border-radius: 4px;
      font-size: 12px; white-space: nowrap;

    .vendor-dd > summary::-webkit-details-marker { display: none; }
    .vendor-dd-panel {
      position: absolute; top: calc(100% + 4px); left: 0; width: 250px;
      max-height: 320px; overflow: auto; background: #1a1a2e;
      border: 1px solid #444; border-radius: 6px; z-index: 10; padding: 8px;

    #vendorDdSearch, #vendorDrawerSearch {
      box-sizing: border-box; padding: 6px 9px;
      border: 1px solid #555; border-radius: 4px;
      background: #0f0f1e; color: #eee; font-size: 13px;
    }
    #vendorDdSearch { width: 100%; margin-bottom: 6px; }
    .vendor-dd-list { display: flex; flex-direction: column; }
    .vendor-dd-item, .vendor-drawer-item {
      text-align: left; background: transparent; border: none; color: #ddd;
      padding: 7px 9px; cursor: pointer; font-size: 13px; border-radius: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .vendor-dd-item:hover, .vendor-drawer-item:hover { background: #2a2a40; }
    .vendor-dd-item .vc, .vendor-drawer-item .vc { color: #888; font-size: 11px; margin-left: 4px; flex-shrink: 0; }
    .vfilter-tag {
      background: #2a5db0; color: #fff; padding: 3px 10px;

    }

    /* === 事業者ドロワー（右スライドイン） === */
    #vendorDrawerToggle {
      position: fixed; right: 0; top: 12px;
      writing-mode: vertical-rl; background: #2a5db0; color: #fff;
      padding: 16px 9px; border: none; border-radius: 8px 0 0 8px;
      cursor: pointer; z-index: 70; font-size: 14px; letter-spacing: 2px;

    #vendorDrawer {
      position: fixed; top: 0; right: 0; height: 100%; width: 290px; max-width: 80vw;

      transition: transform 0.25s ease; z-index: 96;

    .vendor-drawer-header {
      display: flex; justify-content: space-between; align-items: center;

    #vendorDrawerClose { background: transparent; border: none; color: #ccc; font-size: 18px; cursor: pointer; }
    #vendorDrawerSearch { margin: 0 16px 10px; width: calc(100% - 32px); }
    #vendorDrawerSort {
      display: flex; align-items: center; gap: 6px;
      padding: 0 16px 10px; flex-wrap: wrap;
    }
    #vendorDrawerSort .vds-label { color: #aaa; font-size: 12px; }
    #vendorDrawerSort .vds-btn {
      background: #2a2a40; color: #ccc; border: 1px solid #3a3a55;

    #vendorDrawerSort .vds-btn:hover { background: #353556; }
    #vendorDrawerSort .vds-btn.active {
      background: #2a5db0; color: #fff; border-color: #2a5db0;
    }
    #vendorDrawerList { overflow: auto; flex: 1; padding: 0 8px 16px; }
    .vendor-drawer-item { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .vendor-drawer-item .vd-name { overflow: hidden; text-overflow: ellipsis; }
    body.set-view #vendorDrawerToggle,
    body.set-view #vendorDrawer,
    body.set-view #vendorDrawerBackdrop { display: none !important; }

    /* === Search Result Overlay === */
    #searchResultOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20, 20, 30, 0.96);
      z-index: 88;
      flex-direction: column;
    }
    #searchResultOverlay.open { display: flex; }

    /* === Expand/Collapse All Buttons === */
    .accordion-controls {
      display: flex;
      gap: 6px;
      flex-shrink: 0;

    .accordion-controls button {
      font-size: 12px;
      padding: 4px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
      color: #555;
      cursor: pointer;
      transition: background 0.2s;
    }
    .accordion-controls button:hover { background: #e0e0e0; }
  </style>
</head>
<body>
  <!-- Sidebar Navigation -->
  <nav class="sidebar" id="sidebar"></nav>
  <button class="sidebar-toggle" id="sidebarToggle" title="サイドバーを閉じる">&#10094;</button>

  <!-- Main Content -->
  <div class="main-content" id="mainContent">
    <div class="search-container">
      <div class="search-row">
        <div class="search-input-wrapper">
          <input type="text" id="imageSearchInput" placeholder="商品名・事業者・画像内テキスト・ファイル名で検索" autocomplete="off" spellcheck="false" />
          <button id="searchClearBtn" type="button">&#10005;</button>
        </div>
        <div class="search-mode-toggle">
          <button id="searchModeAnd" class="search-mode-btn active">AND</button>
          <button id="searchModeOr"  class="search-mode-btn">OR</button>
        </div>
        <div class="accordion-controls">
          <button onclick="expandAll()">全て開く</button>
          <button onclick="collapseAll()">全て閉じる</button>
        </div>
      </div>
      <div id="searchResultInfo"></div>
    </div>

    <div id="galleryContainer"></div>
  </div>

  <!-- Modal -->
  <div class="modal" id="myModal">
    <span class="close" onclick="closeModal()">&times;</span>
    <button class="modal-nav modal-prev" id="modalPrevBtn" onclick="modalPrev()">&#10094;</button>
    <button class="modal-nav modal-next" id="modalNextBtn" onclick="modalNext()">&#10095;</button>
    <div class="modal-container">
      <div id="modalImageWrapper">
        <img class="modal-content" id="modalImage" />
        <button id="modalHoverStockBtn" type="button" aria-label="ストック">&#9734;</button>
      </div>
      <div id="caption-container">
        <span id="caption"></span>
        <span id="modalCounter" style="color:#888;font-size:13px;"></span>
        <button id="copyFilenameBtn">ファイル名をコピー</button>
        <button id="copyPrefixBtn">プレフィックスをコピー</button>
        <button id="modalStockBtn" type="button">&#9734; ストック</button>
        <button id="viewSiblingSetBtn" type="button">このセットを見る</button>
        <a id="rakutenLinkBtn" href="#" target="_blank" rel="noopener" style="display:none;">楽天ページを開く</a>
        <button id="viewVendorBtn" type="button" style="display:none;">同じ事業者のバナーを見る</button>
      </div>
    </div>
  </div>

  <!-- Search Result Overlay -->
  <div id="searchResultOverlay">
    <div class="stock-overlay-header">
      <span class="stock-overlay-title" id="searchResultOverlayTitle">検索結果</span>
      <button type="button" class="close-btn" id="searchResultOverlayCloseBtn">閉じる</button>
    </div>
    <div id="sectionFilterBar"></div>
    <div id="vendorFilterBar"></div>
    <div class="stock-overlay-body" id="searchResultOverlayBody"></div>
  </div>

  <!-- Stock Overlay -->
  <div id="stockOverlay">
    <div class="stock-overlay-header">
      <span class="stock-overlay-title" id="stockOverlayTitle">ストック一覧</span>
      <button type="button" class="select-mode-btn"    id="stockSelectModeBtn">解除モード</button>
      <button type="button" class="clear-all-btn"      id="stockClearAllBtn">全解除</button>
      <button type="button" class="download-btn"       id="stockDownloadBtn">ダウンロード</button>
      <button type="button" class="close-btn"          id="stockCloseBtn">閉じる</button>
      <button type="button" class="execute-remove-btn" id="stockExecuteRemoveBtn">解除を実行</button>
      <button type="button" class="cancel-select-btn"  id="stockCancelSelectBtn">キャンセル</button>
    </div>
    <div class="stock-overlay-body" id="stockOverlayBody"></div>
  </div>

  <!-- Stock Counter (bottom-right floating) -->
  <button id="stockCounterBtn" type="button">&#9734; ストック 0 件</button>

  <!-- Scroll Top -->
  <button id="scrollTopBtn" onclick="scrollToTop()">&#9650;</button>

  <!-- 事業者ドロワー（右からスライドイン） -->
  <button id="vendorDrawerToggle" type="button" title="事業者で探す">&#127981; 事業者で探す</button>
  <div id="vendorDrawerBackdrop"></div>
  <aside id="vendorDrawer">
    <div class="vendor-drawer-header">
      <strong>事業者で探す</strong>
      <button type="button" id="vendorDrawerClose" aria-label="閉じる">&#10005;</button>
    </div>
    <input type="text" id="vendorDrawerSearch" placeholder="事業者名で絞り込む" autocomplete="off" />
    <div id="vendorDrawerSort">
      <span class="vds-label">並び順:</span>
      <button type="button" class="vds-btn active" data-sort="images">画像枚数</button>
      <button type="button" class="vds-btn" data-sort="products">商品数</button>
      <button type="button" class="vds-btn" data-sort="name">五十音</button>
    </div>
    <div id="vendorDrawerList"></div>
  </aside>

  <!-- Gallery Index (lightweight, loads immediately) -->
  <script src="gallery_data/index.js"></script>
  <!-- 商品メタ情報（商品名・事業者・楽天URL）。generate_product_meta.py が生成 -->
  <script src="gallery_data/products.js?v=20260604"></script>

  <script>
  (function() {
    'use strict';

    // === State ===
    var loadedSections = {};
    var sectionPanels = {};
    var ocrLoaded = false;
    var ocrLoading = false;
    var searchWorker = null;
    var searchMode = 'and';
    var lastSearchMatches = [];
    var overlayFilteredSections = new Set(); // 空 = すべて表示
    var overlayVendorFilter = null; // 事業者絞り込み（normVendorキー or null）

    // === Build Sidebar + Accordion from Index ===
    function buildGallery() {
      var sidebar = document.getElementById('sidebar');
      var container = document.getElementById('galleryContainer');

      var categoryItems = [];
      var monthlyItems = [];

      GALLERY_INDEX.forEach(function(sec) {
        var num = parseInt(sec.num);
        if (num <= 5) {
          categoryItems.push(sec);
        } else {
          monthlyItems.push(sec);
        }
      });

      var sidebarHTML = '';

      if (categoryItems.length > 0) {
        sidebarHTML += '<div class="sidebar-group-title">商品カテゴリ</div>';
        categoryItems.forEach(function(sec) {
          var label = sec.name.replace(/^\d+_/, '');
          sidebarHTML += '<button class="sidebar-item" data-section="' + sec.num + '">' +
            label + '<span class="badge">(' + sec.imageCount + ')</span></button>';
        });
      }

      if (monthlyItems.length > 0) {
        sidebarHTML += '<div class="sidebar-group-title">月別データ</div>';
        monthlyItems.forEach(function(sec) {
          var label = sec.name.replace(/^\d+_/, '');
          sidebarHTML += '<button class="sidebar-item" data-section="' + sec.num + '">' +
            label + '<span class="badge">(' + sec.imageCount + ')</span></button>';
        });
      }

      sidebar.innerHTML = sidebarHTML;

      // Build accordion sections
      var galleryHTML = '';
      GALLERY_INDEX.forEach(function(sec) {
        galleryHTML += '<button class="accordion" data-section="' + sec.num + '">' +
          sec.name +
          '<span class="section-info">' + sec.productCount + '商品 / ' + sec.imageCount + '枚</span>' +
          '</button>' +
          '<div class="panel" id="panel-' + sec.num + '">' +
          '<div class="panel-loading">読み込み中...</div>' +
          '</div>';
      });
      container.innerHTML = galleryHTML;

      // Store panel references
      GALLERY_INDEX.forEach(function(sec) {
        sectionPanels[sec.num] = document.getElementById('panel-' + sec.num);
      });
    }

    // === Load Section Data ===
    function loadSection(num, callback) {
      if (loadedSections[num]) {
        if (callback) callback();
        return;
      }

      var data = window['GALLERY_' + num];
      if (data) {
        renderSection(num, data);
        loadedSections[num] = true;
        if (callback) callback();
        return;
      }

      var sec = GALLERY_INDEX.find(function(s) { return s.num === num; });
      if (!sec) return;

      var script = document.createElement('script');
      script.src = sec.file;
      script.onload = function() {
        var data = window['GALLERY_' + num];
        if (data) {
          renderSection(num, data);
          loadedSections[num] = true;
        }
        if (callback) callback();
      };
      script.onerror = function() {
        var panel = sectionPanels[num];
        panel.innerHTML = '<div class="panel-loading">データの読み込みに失敗しました</div>';
        if (callback) callback();
      };
      document.head.appendChild(script);
    }

    // === Render Section Images ===
    function escapeAttr(str) {
      return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // === 商品メタ（商品名・事業者・楽天URL）===
    // 画像パス/ファイル名から商品IDを正規化（generate_product_meta.py の normalize_id と同じ規則）
    function normalizeId(src) {
      var s = String(src).split('/').pop();      // ファイル名
      s = s.replace(/\.[A-Za-z0-9]+$/, '');      // 拡張子除去
      s = s.replace(/^\d{1,2}\s*_/, '');         // 先頭の序数 N_/NN_
      s = s.split('_')[0];                          // 最初の _ より前
      s = s.replace(/-\d{1,2}$/, '');            // 末尾のハイフン連番
      return s.toUpperCase();
    }
    function getMeta(src) {
      if (typeof PRODUCT_META === 'undefined' || !src) return null;
      return PRODUCT_META[normalizeId(src)] || null;
    }
    // 事業者名の表記ゆれを吸収したグルーピングキー（株式会社等・空白・創業年を除去）
    function normVendor(v) {
      if (!v) return '';
      return String(v)
        .replace(/株式会社|有限会社|合同会社|（株）|\(株\)|（有）|\(有\)/g, '')
        .replace(/創業\d+/g, '')
        .replace(/[\s　]+/g, '')
        .replace(/^(北海道産?|根室)+/, '')
        .trim();
    }
    // 事業者キー -> { display:代表表示名, count:商品数 } を集計
    // 画像が実在する商品ID -> 画像枚数 を集計（事業者カウントの正確性のため）
    function buildImageCountById() {
      var counts = {};
      if (typeof GALLERY_INDEX === 'undefined') return counts;
      GALLERY_INDEX.forEach(function(sec) {
        var data = window['GALLERY_' + sec.num];
        if (!data || !data.products) return;
        data.products.forEach(function(p) {
          (p.images || []).forEach(function(src) {
            var id = normalizeId(src);
            counts[id] = (counts[id] || 0) + 1;
          });
        });
      });
      return counts;
    }

    function buildVendorIndex() {
      var idx = {};
      if (typeof PRODUCT_META === 'undefined') return idx;
      var imgCountById = buildImageCountById();
      Object.keys(PRODUCT_META).forEach(function(k) {
        var imgCount = imgCountById[k] || 0;
        if (imgCount === 0) return; // 画像が存在しない商品はカウントしない
        var meta = PRODUCT_META[k];
        // 連結事業者(vendors)があれば全社にカウント、無ければ単一vendorで
        var list = (meta.vendors && meta.vendors.length > 0) ? meta.vendors : (meta.vendor ? [meta.vendor] : []);
        list.forEach(function(v) {
          var key = normVendor(v);
          if (!key) return;
          if (!idx[key]) idx[key] = { key: key, productCount: 0, imageCount: 0, displays: {} };
          idx[key].productCount++;
          idx[key].imageCount += imgCount;
          idx[key].displays[v] = (idx[key].displays[v] || 0) + 1;
        });
      });
      Object.keys(idx).forEach(function(key) {
        var ds = idx[key].displays, best = '', bc = -1;
        Object.keys(ds).forEach(function(d) { if (ds[d] > bc) { bc = ds[d]; best = d; } });
        idx[key].display = best;
      });
      return idx;
    }

    function thumbHTML(src) {
      var alt = src.split('/').pop();
      var srcAttr = escapeAttr(src);
      var altAttr = escapeAttr(alt);
      return '<div class="thumb" data-src="' + srcAttr + '">' +
        '<img src="' + srcAttr + '" alt="' + altAttr + '" loading="lazy" onclick="thumbClick(event,this)" />' +
        '<button class="stock-btn" type="button" aria-label="ストック">&#9734;</button>' +
        '</div>';
    }

    function renderSection(num, data) {
      var panel = sectionPanels[num];
      var html = '';

      data.products.forEach(function(product) {
        var mainImages = [];
        var extraImages = [];

        product.images.forEach(function(src) {
          var filename = src.split('/').pop();
          var stem = filename.replace(/\.[^.]+$/, '');
          // Check if it's a numbered image (_01 to _05)
          var match = stem.match(/_(\d{2})$/);
          if (match && parseInt(match[1]) <= 5) {
            mainImages.push(src);
          } else if (match && parseInt(match[1]) > 5) {
            extraImages.push(src);
          } else {
            extraImages.push(src);
          }
        });

        // Main row (up to 5 images)
        if (mainImages.length > 0) {
          html += '<div class="image-row">';
          mainImages.forEach(function(src) {
            html += thumbHTML(src);
          });
          html += '</div>';
        }

        // Extra row
        if (extraImages.length > 0) {
          html += '<div class="image-row">';
          extraImages.forEach(function(src) {
            html += thumbHTML(src);
          });
          html += '</div>';
        }
      });

      panel.innerHTML = html;
      StockManager.applyToPanel(panel);
    }

    // === Accordion Behavior ===
    function scrollToAccordion(btn) {
      var searchBar = document.querySelector('.search-container');
      var offset = searchBar ? searchBar.offsetHeight + 8 : 80;
      var top = btn.getBoundingClientRect().top + window.pageYOffset - offset;
      window.scrollTo({ top: top, behavior: 'smooth' });
    }

    function initAccordions() {
      document.getElementById('galleryContainer').addEventListener('click', function(e) {
        var btn = e.target.closest('.accordion');
        if (!btn) return;

        var num = btn.getAttribute('data-section');
        btn.classList.toggle('active');

        var panel = sectionPanels[num];
        if (panel.style.display === 'block') {
          panel.style.display = 'none';
        } else {
          panel.style.display = 'block';
          loadSection(num);
          scrollToAccordion(btn);
        }
      });
    }

    // === Sidebar Behavior ===
    function initSidebar() {
      var sidebar = document.getElementById('sidebar');
      var toggle = document.getElementById('sidebarToggle');
      var main = document.getElementById('mainContent');

      toggle.addEventListener('click', function() {
        sidebar.classList.toggle('collapsed');
        main.classList.toggle('expanded');
        if (sidebar.classList.contains('collapsed')) {
          toggle.style.left = '0';
          toggle.innerHTML = '&#10095;';
          toggle.title = 'サイドバーを開く';
        } else {
          toggle.style.left = '220px';
          toggle.innerHTML = '&#10094;';
          toggle.title = 'サイドバーを閉じる';
        }
      });

      sidebar.addEventListener('click', function(e) {
        var item = e.target.closest('.sidebar-item');
        if (!item) return;

        var num = item.getAttribute('data-section');
        var btn = document.querySelector('.accordion[data-section="' + num + '"]');
        if (!btn) return;

        // Toggle accordion open/close, then scroll to put header just below search bar
        var panel = sectionPanels[num];
        if (panel.style.display === 'block') {
          btn.classList.remove('active');
          panel.style.display = 'none';
        } else {
          btn.classList.add('active');
          panel.style.display = 'block';
          loadSection(num);
        }
        scrollToAccordion(btn);

        // Highlight active sidebar item
        document.querySelectorAll('.sidebar-item').forEach(function(el) {
          el.classList.remove('active');
        });
        item.classList.add('active');
      });
    }

    // === Modal ===
    var modal = document.getElementById('myModal');
    var modalImg = document.getElementById('modalImage');
    var captionText = document.getElementById('caption');
    var modalCounter = document.getElementById('modalCounter');
    var copyFilenameBtn = document.getElementById('copyFilenameBtn');
    var copyPrefixBtn = document.getElementById('copyPrefixBtn');
    var modalPrevBtn = document.getElementById('modalPrevBtn');
    var modalNextBtn = document.getElementById('modalNextBtn');
    var modalStockBtn = document.getElementById('modalStockBtn');
    var isCopyingFilename = false;
    var isCopyingPrefix = false;
    var currentModalSrc = '';

    var modalImages = [];
    var modalCurrentIndex = -1;

    function getOriginalSrc(elem) {
      var container = elem.closest && (elem.closest('.thumb') || elem.closest('.stock-cell'));
      if (container) return container.getAttribute('data-src') || '';
      try {
        return decodeURIComponent(elem.getAttribute('src') || '');
      } catch (e) {
        return elem.getAttribute('src') || '';
      }
    }

    function updateModalDisplay(index) {
      var elem = modalImages[index];
      var filename = elem.alt;
      modalImg.src = elem.src;
      currentModalSrc = getOriginalSrc(elem);
      var meta = getMeta(currentModalSrc);
      var capHtml = '';
      if (meta && meta.name) capHtml += '<span class="cap-name">' + escapeAttr(meta.name) + '</span>';
      if (meta && meta.vendor) capHtml += '<span class="cap-vendor">' + escapeAttr(meta.vendor) + '</span>';
      capHtml += '<span class="cap-file">' + escapeAttr(filename) + '</span>';
      captionText.innerHTML = capHtml;
      updateRakutenBtn(meta);
      updateVendorBtn(meta);
      modalCounter.textContent = (index + 1) + ' / ' + modalImages.length;
      modalPrevBtn.disabled = index <= 0;
      modalNextBtn.disabled = index >= modalImages.length - 1;
      updateModalStockBtn();
      updateSiblingBtn();

      var originalFilenameBtnText = 'ファイル名をコピー';
      var originalPrefixBtnText = 'プレフィックスをコピー';
      isCopyingFilename = false;
      isCopyingPrefix = false;
      copyFilenameBtn.innerText = originalFilenameBtnText;
      copyPrefixBtn.innerText = originalPrefixBtnText;

      copyFilenameBtn.onclick = function() {
        if (isCopyingFilename) return;
        var lastDotIndex = filename.lastIndexOf('.');
        var nameWithoutExtension = lastDotIndex > 0 ? filename.substring(0, lastDotIndex) : filename;
        isCopyingFilename = true;
        copyFilenameBtn.innerText = 'コピーしました！';
        copyToClipboard(nameWithoutExtension, function() {
          copyFilenameBtn.innerText = originalFilenameBtnText;
          isCopyingFilename = false;
        });
      };

      copyPrefixBtn.onclick = function() {
        if (isCopyingPrefix) return;
        var firstUnderscoreIndex = filename.indexOf('_');
        var prefix;
        if (firstUnderscoreIndex !== -1) {
          prefix = filename.substring(0, firstUnderscoreIndex);
        } else {
          var lastDotIndex = filename.lastIndexOf('.');
          prefix = lastDotIndex > 0 ? filename.substring(0, lastDotIndex) : filename;
        }
        isCopyingPrefix = true;
        copyPrefixBtn.innerText = 'コピーしました！';
        copyToClipboard(prefix, function() {
          copyPrefixBtn.innerText = originalPrefixBtnText;
          isCopyingPrefix = false;
        });
      };
    }

    window.thumbClick = function(e, img) {
      if (e.ctrlKey || e.metaKey) {

        if (thumb) StockManager.toggle(thumb.getAttribute('data-src'));
      } else {
        openModal(img);
      }
    };

    window.openModal = function(elem, customList) {
      if (customList && customList.length) {
        modalImages = customList;
      } else {
        var panel = elem.closest('.panel');
        if (panel) {
          modalImages = Array.from(panel.querySelectorAll('.thumb:not(.hidden) img'));
        } else {
          modalImages = [elem];
        }
      }
      modalCurrentIndex = modalImages.indexOf(elem);
      if (modalCurrentIndex < 0) modalCurrentIndex = 0;
      modal.style.display = 'flex';
      updateModalDisplay(modalCurrentIndex);
    };

    window.modalPrev = function() {
      if (modalCurrentIndex > 0) {
        modalCurrentIndex--;
        updateModalDisplay(modalCurrentIndex);
      }
    };

    window.modalNext = function() {
      if (modalCurrentIndex < modalImages.length - 1) {
        modalCurrentIndex++;
        updateModalDisplay(modalCurrentIndex);
      }
    };

    window.closeModal = function() {
      modal.style.display = 'none';
    };

    window.onclick = function(event) {
      if (event.target === modal) closeModal();
    };

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        if (modal.style.display === 'flex') closeModal();
        else if (stockOverlay.classList.contains('open')) closeStockOverlay();
        else if (document.getElementById('searchResultOverlay').classList.contains('open')) closeSearchResultOverlay();
        return;
      }
      if (modal.style.display !== 'flex') return;
      if (e.key === 'ArrowLeft') modalPrev();
      else if (e.key === 'ArrowRight') modalNext();
      else if (e.key === 'Enter') { e.preventDefault(); if (currentModalSrc) StockManager.toggle(currentModalSrc); }
    });

    function copyToClipboard(text, onDone) {
      if (!navigator.clipboard) {
        alert('この環境ではコピー機能は利用できません。');
        if (onDone) onDone();
        return;
      }
      navigator.clipboard.writeText(text).then(function() {
        setTimeout(function() { if (onDone) onDone(); }, 1500);
      }).catch(function() {
        alert('コピーに失敗しました。');
        if (onDone) onDone();
      });
    }

    // === Search ===

    function updateSearchResultInfo(resultInfo, count, suffix, matches) {
      var safeSuffix = suffix ? String(suffix).replace(/[&<>"]/g, function(c) {
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];
      }) : '';
      if (count === 0) {
        resultInfo.innerHTML =
          '<span class="result-count">0</span>' +
          '<span class="result-label">件の画像が見つかりました' + safeSuffix + '</span>';
        return;
      }
      resultInfo.innerHTML =
        '<span class="result-count">' + count + '</span>' +
        '<span class="result-label">件の画像が見つかりました' + safeSuffix + '</span>' +
        '<button id="openSearchFlatBtn" type="button">一覧で見る</button>';
      var btn = document.getElementById('openSearchFlatBtn');
      if (btn) btn.addEventListener('click', function() { openSearchResultOverlay(matches); });
    }

    function renderOverlayGrid(allMatches) {
      var body = document.getElementById('searchResultOverlayBody');
      var title = document.getElementById('searchResultOverlayTitle');

      var filtered = allMatches;
      if (overlayFilteredSections.size > 0) {
        filtered = filtered.filter(function(m) { return overlayFilteredSections.has(m.sectionNum); });
      }
      if (overlayVendorFilter) {
        filtered = filtered.filter(function(m) {
          var meta = getMeta(m.src);
          return meta && meta.vendor && normVendor(meta.vendor) === overlayVendorFilter;
        });
      }

      var isFiltered = overlayFilteredSections.size > 0 || overlayVendorFilter;
      title.textContent = isFiltered
        ? '検索結果 ' + filtered.length + '件（全' + allMatches.length + '件中）'
        : '検索結果 ' + allMatches.length + '件';

      var html = '<div class="stock-grid">';
      filtered.forEach(function(m) {
        var src = m.src;
        var alt = src.split('/').pop();
        var srcA = escapeAttr(src), altA = escapeAttr(alt);
        html += '<div class="stock-cell" data-src="' + srcA + '">' +
          '<img src="' + srcA + '" alt="' + altA + '" loading="lazy" />' +
          '<button class="stock-btn" type="button" aria-label="ストック">&#9734;</button>' +
          '<div class="stock-cell-caption">' + altA + '</div></div>';
      });
      html += '</div>';
      body.innerHTML = html;
      StockManager.applyToPanel(body);
      body.querySelectorAll('.stock-cell').forEach(function(cell) {
        var src = cell.getAttribute('data-src');
        if (StockManager.has(src)) {
          cell.classList.add('stocked');
          var btn = cell.querySelector('.stock-btn');
          if (btn) btn.innerHTML = '&#9733;';
        }
      });

    function buildOverlaySectionFilter(allMatches) {
      var bar = document.getElementById('sectionFilterBar');
      var seen = {};
      allMatches.forEach(function(m) { seen[m.sectionNum] = true; });
      var secNums = Object.keys(seen);
      if (secNums.length <= 1) { bar.classList.remove('visible'); return; }

      var html = '<span style="color:#888;font-size:12px;flex-shrink:0;margin-right:2px;">絞り込み:</span>';
      html += '<button class="section-filter-chip active" data-sec="all">すべて</button>';
      GALLERY_INDEX.forEach(function(s) {
        if (!seen[s.num]) return;
        var label = escapeAttr(s.name.replace(/^\d+_/, ''));
        html += '<button class="section-filter-chip" data-sec="' + escapeAttr(s.num) + '">' + label + '</button>';
      });
      bar.innerHTML = html;
      bar.classList.add('visible');

      bar.onclick = function(e) {
        var chip = e.target.closest('.section-filter-chip');
        if (!chip) return;
        var sec = chip.getAttribute('data-sec');
        if (sec === 'all') {
          overlayFilteredSections.clear();
          bar.querySelectorAll('.section-filter-chip').forEach(function(c) { c.classList.remove('active'); });
          chip.classList.add('active');
        } else {
          bar.querySelector('[data-sec="all"]').classList.remove('active');
          if (overlayFilteredSections.has(sec)) {
            overlayFilteredSections.delete(sec);
            chip.classList.remove('active');
            if (overlayFilteredSections.size === 0) {
              bar.querySelector('[data-sec="all"]').classList.add('active');
            }
          } else {
            overlayFilteredSections.add(sec);
            chip.classList.add('active');
          }
        }
        renderOverlayGrid(lastSearchMatches);
      };
    }

    // 検索結果オーバーレイの「事業者で絞り込む」ドロップダウン
    function buildOverlayVendorFilter(allMatches) {
      var bar = document.getElementById('vendorFilterBar');
      if (!bar) return;
      var idx = {};
      allMatches.forEach(function(m) {
        var meta = getMeta(m.src);
        if (!meta) return;
        var list = (meta.vendors && meta.vendors.length > 0) ? meta.vendors : (meta.vendor ? [meta.vendor] : []);
        list.forEach(function(v) {
          var key = normVendor(v);
          if (!key) return;
          if (!idx[key]) idx[key] = { count: 0, displays: {} };
          idx[key].count++;
          idx[key].displays[v] = (idx[key].displays[v] || 0) + 1;
        });
      });
      var keys = Object.keys(idx);
      if (keys.length <= 1) { bar.innerHTML = ''; bar.classList.remove('visible'); return; }
      keys.forEach(function(k) {
        var ds = idx[k].displays, best = '', bc = -1;
        Object.keys(ds).forEach(function(d) { if (ds[d] > bc) { bc = ds[d]; best = d; } });
        idx[k].display = best;
      });
      keys.sort(function(a, b) { return idx[b].count - idx[a].count; });

      var listHtml = '<button class="vendor-dd-item" data-vk="" data-disp="">すべての事業者</button>';
      keys.forEach(function(k) {
        var d = escapeAttr(idx[k].display);
        listHtml += '<button class="vendor-dd-item" data-vk="' + escapeAttr(k) + '" data-disp="' + d + '">' +
          d + ' <span class="vc">(' + idx[k].count + ')</span></button>';
      });

      bar.innerHTML =
        '<span class="vfilter-label">事業者:</span>' +
        '<details id="vendorDd" class="vendor-dd">' +
          '<summary id="vendorDdSummary">すべて &#9662;</summary>' +
          '<div class="vendor-dd-panel">' +
            '<input type="text" id="vendorDdSearch" placeholder="事業者を検索" autocomplete="off" />' +
            '<div class="vendor-dd-list">' + listHtml + '</div>' +
          '</div>' +
        '</details>' +
        '<span id="vendorActiveTag"></span>';
      bar.classList.add('visible');

      var dd = document.getElementById('vendorDd');
      var summary = document.getElementById('vendorDdSummary');
      var search = document.getElementById('vendorDdSearch');
      var tag = document.getElementById('vendorActiveTag');
      var list = bar.querySelector('.vendor-dd-list');

      search.addEventListener('input', function() {
        var q = normalizeForSearch(this.value);
        list.querySelectorAll('.vendor-dd-item').forEach(function(it) {
          var vk = it.getAttribute('data-vk');
          var d = it.getAttribute('data-disp');
          it.style.display = (vk === '' || !q || normalizeForSearch(d).indexOf(q) >= 0) ? '' : 'none';
        });
      });

      list.addEventListener('click', function(e) {
        var it = e.target.closest('.vendor-dd-item');
        if (!it) return;
        var vk = it.getAttribute('data-vk');
        var disp = it.getAttribute('data-disp');
        overlayVendorFilter = vk || null;
        if (overlayVendorFilter) {
          var short = disp.length > 7 ? disp.slice(0, 7) + '…' : disp;
          summary.innerHTML = escapeAttr(short) + ' &#9662;';
          tag.innerHTML = '<span class="vfilter-tag">事業者: ' + escapeAttr(disp) + ' <span class="vfilter-x">&#10005;</span></span>';
        } else {
          summary.innerHTML = 'すべて &#9662;';
          tag.innerHTML = '';
        }
        dd.open = false;
        renderOverlayGrid(lastSearchMatches);
      });

      tag.addEventListener('click', function() {
        overlayVendorFilter = null;
        summary.innerHTML = 'すべて &#9662;';
        tag.innerHTML = '';
        if (search) search.value = '';
        list.querySelectorAll('.vendor-dd-item').forEach(function(it) { it.style.display = ''; });
        renderOverlayGrid(lastSearchMatches);
      });

    // === Search Mode Toggle (AND/OR) ===
    function initSearchModeToggle() {
      var andBtn = document.getElementById('searchModeAnd');

    // === Search Normalization ===
    function normalizeForSearch(str) {
      if (!str) return '';
      return str
        .toLowerCase()
        // 全角英数字・記号 → 半角
        .replace(/[！-～]/g, function(c) {
          return String.fromCharCode(c.charCodeAt(0) - 0xFEE0);
        })
        // ひらがな → カタカナ
        .replace(/[ぁ-ゖ]/g, function(c) {
          return String.fromCharCode(c.charCodeAt(0) + 0x60);
        });
    }

    function initSearch() {
      var searchInput = document.getElementById('imageSearchInput');
      var clearBtn = document.getElementById('searchClearBtn');
      var resultInfo = document.getElementById('searchResultInfo');
      var searchTimeout = null;

      // Lazy-load OCR data on first search focus
      searchInput.addEventListener('focus', function() {
        if (!ocrLoaded && !ocrLoading) {
          ocrLoading = true;
          var script = document.createElement('script');
          script.src = 'ocr_data.js';
          script.onload = function() {
            ocrLoaded = true;
            ocrLoading = false;
            initSearchWorker();
          };
          script.onerror = function() {
            ocrLoading = false;
            // OCR not available, search will work on filenames only
          };
          document.head.appendChild(script);
        }
      }, { once: true });

      clearBtn.addEventListener('click', function() {
        if (searchTimeout) clearTimeout(searchTimeout);
        lastSearchMatches = [];
        searchInput.value = '';
        clearBtn.style.display = 'none';
        resultInfo.textContent = '';
        resetSearchResults();
        searchInput.focus();
      });

      searchInput.addEventListener('input', function() {
        var query = this.value.trim();
        clearBtn.style.display = query.length > 0 ? 'block' : 'none';

        if (query === '') {
          lastSearchMatches = [];
          resultInfo.textContent = '';
          resetSearchResults();
          return;
        }

        // Debounce
        if (searchTimeout) clearTimeout(searchTimeout);
        searchTimeout = setTimeout(function() {
          performSearch(normalizeForSearch(query));
        }, 200);
      });
    }

    function resetSearchResults() {
      document.querySelectorAll('.accordion.search-active').forEach(function(el) { el.classList.remove('search-active'); });
      document.querySelectorAll('.panel.search-active').forEach(function(el) { el.classList.remove('search-active'); });
      document.querySelectorAll('.image-row.hidden').forEach(function(el) { el.classList.remove('hidden'); });
      document.querySelectorAll('.image-row .thumb.hidden').forEach(function(el) { el.classList.remove('hidden'); });
      closeSearchResultOverlay();
    }

    function performSearch(query) {
      var terms = query.split(/\s+/).filter(Boolean);
      if (terms.length === 0) return;

      if (searchWorker) {
        searchWorker.postMessage({ type: 'search', query: query, terms: terms, searchMode: searchMode });
      } else {
        doMainThreadSearch(query, terms);
      }
    }

    function matchesTerms(target, terms) {
      var n = normalizeForSearch(target);
      if (searchMode === 'and') return terms.every(function(t) { return n.includes(t); });
      return terms.some(function(t) { return n.includes(t); });
    }

    function doMainThreadSearch(query, terms) {
      terms = terms || query.split(/\s+/).filter(Boolean);
      var resultInfo = document.getElementById('searchResultInfo');
      var matchCount = 0;
      var matchingSections = new Set();
      var allMatches = [];

      GALLERY_INDEX.forEach(function(sec) {
        var data = window['GALLERY_' + sec.num];
        if (!data) return;

        data.products.forEach(function(product) {
          product.images.forEach(function(src) {
            var isMatch = matchesTerms(src.split('/').pop(), terms) || matchesTerms(src, terms);

            if (!isMatch) {
              var meta = getMeta(src);
              if (meta) {
                if (meta.name && matchesTerms(meta.name, terms)) isMatch = true;
                if (!isMatch) {
                  var vs = (meta.vendors && meta.vendors.length > 0) ? meta.vendors : (meta.vendor ? [meta.vendor] : []);
                  for (var vi = 0; vi < vs.length; vi++) { if (matchesTerms(vs[vi], terms)) { isMatch = true; break; } }
                }
              }
            }

            if (!isMatch && typeof OCR_DATA !== 'undefined') {
              var key = decodeURIComponent(src);
              if (OCR_DATA[key]) isMatch = matchesTerms(OCR_DATA[key], terms);
            }

            if (isMatch) {
              matchCount++;
              matchingSections.add(sec.num);
              allMatches.push({ sectionNum: sec.num, src: src });
            }
          });
        });
      });

      // Also search through unloaded sections via index
      // Load matching sections that aren't loaded yet
      var unloadedSections = [];
      GALLERY_INDEX.forEach(function(sec) {
        if (!window['GALLERY_' + sec.num]) {
          unloadedSections.push(sec.num);
        }
      });

      var suffix = unloadedSections.length > 0 ? '（一部セクション未読み込み）' : '';
      updateSearchResultInfo(resultInfo, matchCount, suffix, allMatches);

      // Apply visual filtering to loaded panels
      resetSearchResults();
      lastSearchMatches = allMatches;

      if (matchCount === 0) return;

      // Show matching sections
      matchingSections.forEach(function(num) {
        var acc = document.querySelector('.accordion[data-section="' + num + '"]');
        var panel = sectionPanels[num];
        if (acc) acc.classList.add('search-active');
        if (panel) panel.classList.add('search-active');
      });

      // Filter thumbs in loaded panels
      var matchSrcSet = new Set(allMatches.map(function(m) { return m.src; }));

      document.querySelectorAll('.panel .thumb').forEach(function(thumb) {
        var src = decodeURIComponent(thumb.getAttribute('data-src') || '');
        if (!matchSrcSet.has(src)) {
          thumb.classList.add('hidden');
        }
      });

      // Hide rows with all thumbs hidden
      document.querySelectorAll('.image-row').forEach(function(row) {
        var visible = row.querySelectorAll('.thumb:not(.hidden)');
        if (visible.length === 0) {
          row.classList.add('hidden');
        }
      });
    }

    function initSearchWorker() {
      // Create a Web Worker from a Blob for file:// compatibility
      var workerCode = [
        'var ocrData = null;',
        'var galleryIndex = null;',
        'var productMeta = null;',
        'function normalizeForSearch(str) {',
        '  if (!str) return "";',
        '  return str.toLowerCase()',
        '    .replace(/[\\uFF01-\\uFF5E]/g, function(c) { return String.fromCharCode(c.charCodeAt(0) - 0xFEE0); })',
        '    .replace(/[\\u3041-\\u3096]/g, function(c) { return String.fromCharCode(c.charCodeAt(0) + 0x60); });',
        '}',
        'function wNormId(src) {',
        '  var s = String(src).split("/").pop();',
        '  s = s.replace(/\\.[A-Za-z0-9]+$/, "");',
        '  s = s.replace(/^\\d{1,2}\\s*_/, "");',
        '  s = s.split("_")[0];',
        '  s = s.replace(/-\\d{1,2}$/, "");',
        '  return s.toUpperCase();',
        '}',
        '',
        'self.onmessage = function(e) {',
        '  var msg = e.data;',
        '  if (msg.type === "init") {',
        '    ocrData = msg.ocrData;',
        '    galleryIndex = msg.galleryIndex;',
        '    productMeta = msg.productMeta;',
        '  } else if (msg.type === "search") {',
        '    var query = msg.query;',
        '    var terms = msg.terms || [query];',
        '    var mode = msg.searchMode || "and";',
        '    function mt(target) {',
        '      var n = normalizeForSearch(target);',
        '      if (mode === "and") return terms.every(function(t) { return n.includes(t); });',
        '      return terms.some(function(t) { return n.includes(t); });',
        '    }',
        '    var matches = [];',
        '    if (!galleryIndex) { self.postMessage({ matches: [], query: query }); return; }',
        '    galleryIndex.forEach(function(sec) {',
        '      if (!sec.products) return;',
        '      sec.products.forEach(function(product) {',
        '        product.images.forEach(function(src) {',
        '          var isMatch = mt(src.split("/").pop()) || mt(src);',
        '          if (!isMatch && productMeta) {',
        '            var pm = productMeta[wNormId(src)];',
        '            if (pm) {',
        '              if (pm.name && mt(pm.name)) isMatch = true;',
        '              if (!isMatch) {',
        '                var vs = (pm.vendors && pm.vendors.length > 0) ? pm.vendors : (pm.vendor ? [pm.vendor] : []);',
        '                for (var vi = 0; vi < vs.length; vi++) { if (mt(vs[vi])) { isMatch = true; break; } }',
        '              }',
        '            }',
        '          }',
        '          if (!isMatch && ocrData) {',
        '            var key = src;',
        '            if (ocrData[key] && mt(ocrData[key])) isMatch = true;',
        '          }',
        '          if (isMatch) matches.push({ sectionNum: sec.num, src: src });',
        '        });',
        '      });',
        '    });',
        '    self.postMessage({ matches: matches, query: query });',
        '  }',
        '};'
      ].join('\n');

      try {
        var blob = new Blob([workerCode], { type: 'application/javascript' });
        searchWorker = new Worker(URL.createObjectURL(blob));

        // Build full gallery data for worker
        var fullData = GALLERY_INDEX.map(function(sec) {
          var data = window['GALLERY_' + sec.num];
          return {
            num: sec.num,
            products: data ? data.products : null
          };
        });

        searchWorker.postMessage({
          type: 'init',
          ocrData: typeof OCR_DATA !== 'undefined' ? OCR_DATA : null,
          productMeta: typeof PRODUCT_META !== 'undefined' ? PRODUCT_META : null,
          galleryIndex: fullData
        });

        searchWorker.onmessage = function(e) {
          var result = e.data;
          handleSearchResults(result.matches, result.query);
        };

        // 安全網: セクションロード完了後に Worker データを再送信
        setTimeout(updateSearchWorkerData, 2000);
      } catch(err) {
        // Web Worker not supported, fallback to main thread
        searchWorker = null;
      }
    }

    function handleSearchResults(matches, query) {
      var resultInfo = document.getElementById('searchResultInfo');
      updateSearchResultInfo(resultInfo, matches.length, '', matches);

      resetSearchResults();
      lastSearchMatches = matches;
      if (matches.length === 0) return;

      var matchingSections = new Set();
      var matchSrcSet = new Set();
      matches.forEach(function(m) {
        matchingSections.add(m.sectionNum);
        matchSrcSet.add(m.src);
      });

      matchingSections.forEach(function(num) {
        var acc = document.querySelector('.accordion[data-section="' + num + '"]');
        var panel = sectionPanels[num];
        if (acc) acc.classList.add('search-active');
        if (panel) {
          panel.classList.add('search-active');
          // Load section if not loaded
          if (!loadedSections[num]) {
            loadSection(num, function() {
              filterPanelImages(num, matchSrcSet);
            });
          }
        }
      });

      // Filter loaded panels
      document.querySelectorAll('.panel .thumb').forEach(function(thumb) {
        var src = decodeURIComponent(thumb.getAttribute('data-src') || '');
        if (!matchSrcSet.has(src)) {
          thumb.classList.add('hidden');
        }
      });

      document.querySelectorAll('.image-row').forEach(function(row) {
        var visible = row.querySelectorAll('.thumb:not(.hidden)');
        if (visible.length === 0) {
          row.classList.add('hidden');
        }

    // === Stock Manager ===
    var StockManager = (function() {
      var STORAGE_KEY = 'gallery.stockedSrcs';
      var stockSet = new Set();
      var stockOrder = [];

      function load() {
        try {
          var raw = sessionStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          var arr = JSON.parse(raw);
          if (Array.isArray(arr)) {
            arr.forEach(function(s) {
              if (typeof s === 'string' && !stockSet.has(s)) {
                stockSet.add(s);
                stockOrder.push(s);
              }
            });
          }
        } catch (e) { /* ignore corrupt storage */ }
      }

      function persist() {
        try {
          sessionStorage.setItem(STORAGE_KEY, JSON.stringify(stockOrder));
        } catch (e) { /* quota exceeded — fail silently */ }
      }

      function notify() {
        updateCounterBtn();
        // Reflect on every visible thumb across panels
        document.querySelectorAll('.thumb').forEach(function(thumb) {
          var src = thumb.getAttribute('data-src');
          if (stockSet.has(src)) {
            thumb.classList.add('stocked');
            var btn = thumb.querySelector('.stock-btn');
            if (btn) btn.innerHTML = '&#9733;';
          } else {
            thumb.classList.remove('stocked');
            var btn2 = thumb.querySelector('.stock-btn');
            if (btn2) btn2.innerHTML = '&#9734;';
          }
        });
        updateModalStockBtn();
        if (stockOverlay.classList.contains('open')) {
          renderStockOverlay();
        }
        // 検索結果オーバーレイの .stock-cell も即時反映
        document.querySelectorAll('#searchResultOverlayBody .stock-cell').forEach(function(cell) {
          var src = cell.getAttribute('data-src');
          var stocked = stockSet.has(src);
          cell.classList.toggle('stocked', stocked);
          var btn = cell.querySelector('.stock-btn');
          if (btn) btn.innerHTML = stocked ? '&#9733;' : '&#9734;';
        });
      }

      return {
        has: function(src) { return stockSet.has(src); },
        size: function() { return stockOrder.length; },
        list: function() { return stockOrder.slice(); },
        add: function(src) {
          if (stockSet.has(src)) return;
          stockSet.add(src);
          stockOrder.push(src);
          persist();
          notify();
        },
        remove: function(src) {
          if (!stockSet.has(src)) return;
          stockSet.delete(src);
          var idx = stockOrder.indexOf(src);
          if (idx >= 0) stockOrder.splice(idx, 1);
          persist();
          notify();
        },
        toggle: function(src) {
          if (stockSet.has(src)) {
            this.remove(src);
          } else {
            this.add(src);
          }
        },
        clear: function() {
          stockSet.clear();
          stockOrder = [];
          persist();
          notify();
        },
        applyToPanel: function(panel) {
          if (!panel) return;
          panel.querySelectorAll('.thumb').forEach(function(thumb) {
            var src = thumb.getAttribute('data-src');
            if (stockSet.has(src)) {
              thumb.classList.add('stocked');
              var btn = thumb.querySelector('.stock-btn');
              if (btn) btn.innerHTML = '&#9733;';
            }
          });
        },
        loadFromStorage: load
      };
    })();

    // === Download ===
    var jsZipLoaded = false;
    var jsZipLoading = false;

    function loadJSZip(callback) {
      if (jsZipLoaded) { callback(); return; }
      if (jsZipLoading) { setTimeout(function() { loadJSZip(callback); }, 100); return; }
      jsZipLoading = true;
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
      s.onload = function() { jsZipLoaded = true; jsZipLoading = false; callback(); };
      s.onerror = function() { jsZipLoading = false; callback(); };
      document.head.appendChild(s);

    function triggerDownload(href, filename) {
      var a = document.createElement('a');
      a.href = href;
      a.download = filename || href.split('/').pop();
      document.body.appendChild(a);
      a.click();
      setTimeout(function() { document.body.removeChild(a); }, 200);
    }

    function makeZipName() {
      var now = new Date();
      var pad = function(n) { return String(n).padStart(2, '0'); };
      var yy = pad(now.getFullYear() % 100);
      var mm = pad(now.getMonth() + 1);
      var dd = pad(now.getDate());
      var HH = pad(now.getHours());
      var MM = pad(now.getMinutes());
      var SS = pad(now.getSeconds());
      return '楽天ギャラリーDL_' + yy + mm + dd + '-' + HH + MM + '-' + SS + '.zip';
    }

    function downloadStockedImages() {
      var list = StockManager.list();
      if (list.length === 0) { alert('ストックされた画像がありません。'); return; }

      var btn = document.getElementById('stockDownloadBtn');

      if (list.length === 1) {
        triggerDownload(list[0], list[0].split('/').pop());
        return;
      }

      // 2枚以上: ZIP
      btn.textContent = '準備中...';
      btn.disabled = true;

      loadJSZip(function() {
        if (typeof JSZip === 'undefined') {
          // JSZip 読み込み失敗 → 個別ダウンロードにフォールバック
          list.forEach(function(src, i) {
            setTimeout(function() { triggerDownload(src, src.split('/').pop()); }, i * 400);
          });
          btn.textContent = 'ダウンロード';
          btn.disabled = false;
          return;
        }

        var zip = new JSZip();
        var promises = list.map(function(src) {
          return fetch(src)
            .then(function(r) {
              if (!r.ok) throw new Error('fetch: ' + r.status);
              return r.blob();
            })
            .then(function(blob) {
              var name = src.split('/').pop();
              zip.file(name, blob);
            })
            .catch(function(err) {
              console.warn('ダウンロードスキップ:', src, err);
            });
        });

        Promise.all(promises)
          .then(function() { return zip.generateAsync({ type: 'blob', compression: 'DEFLATE' }); })
          .then(function(content) {
            var url = URL.createObjectURL(content);
            triggerDownload(url, makeZipName());
            setTimeout(function() { URL.revokeObjectURL(url); }, 15000);
            btn.textContent = 'ダウンロード';
            btn.disabled = false;
          })
          .catch(function(err) {
            console.error('ZIP生成失敗:', err);
            alert('ZIPの生成に失敗しました。個別にダウンロードします。');
            list.forEach(function(src, i) {
              setTimeout(function() { triggerDownload(src, src.split('/').pop()); }, i * 400);
            });
            btn.textContent = 'ダウンロード';
            btn.disabled = false;
          });
      });
    }

    // === 事業者ドロワー（右スライドイン） ===
    // 屋号だけ抽出（株式会社・有限会社等を除去）。並び替えキーに使う。
    function vendorYago(v) {
      return String(v || '')
        .replace(/株式会社|有限会社|合同会社|（株）|\(株\)|（有）|\(有\)/g, '')
        .replace(/創業\d+/g, '')
        .replace(/[\s　]+/g, '')
        .trim();
    }

    var vendorDrawerSort = 'images'; // 'images' | 'products' | 'name'
    // 五十音ソート用のキー: VENDOR_READINGS にあれば読み(ひらがな)、無ければ屋号にフォールバック
    function vendorSortKey(display) {
      if (typeof VENDOR_READINGS !== 'undefined' && VENDOR_READINGS[display]) {
        return VENDOR_READINGS[display];
      }
      return vendorYago(display);
    }
    function renderVendorDrawerList() {
      var list = document.getElementById('vendorDrawerList');
      if (!list) return;
      var vi = buildVendorIndex();
      var keys = Object.keys(vi).sort(function(a, b) {
        if (vendorDrawerSort === 'products') return vi[b].productCount - vi[a].productCount;
        if (vendorDrawerSort === 'images')   return vi[b].imageCount   - vi[a].imageCount;
        return vendorSortKey(vi[a].display).localeCompare(vendorSortKey(vi[b].display), 'ja');
      });
      if (keys.length === 0) {
        list.innerHTML = '<div style="padding:20px;color:#888;font-size:13px;">読み込み中...</div>';
        return;
      }
      var html = '';
      keys.forEach(function(k) {
        var d = escapeAttr(vi[k].display);
        html += '<button class="vendor-drawer-item" data-vendor="' + d + '" title="' + d + '">' +
          '<span class="vd-name">' + d + '</span>' +
          '<span class="vc">' + vi[k].productCount + '商品 / ' + vi[k].imageCount + '枚</span>' +
          '</button>';

    function initVendorDrawer() {
      var toggle = document.getElementById('vendorDrawerToggle');
      var drawer = document.getElementById('vendorDrawer');
      var backdrop = document.getElementById('vendorDrawerBackdrop');
      var closeBtn = document.getElementById('vendorDrawerClose');
      var search = document.getElementById('vendorDrawerSearch');
      var list = document.getElementById('vendorDrawerList');
      if (!toggle || !drawer || !list) return;

      renderVendorDrawerList();

      function openDrawer() {
        drawer.classList.add('open');
        backdrop.classList.add('open');
        setTimeout(function() { try { search.focus(); } catch (e) {} }, 120);
      }
      function closeDrawer() {
        drawer.classList.remove('open');
        backdrop.classList.remove('open');
      }
      toggle.addEventListener('click', openDrawer);
      closeBtn.addEventListener('click', closeDrawer);
      backdrop.addEventListener('click', closeDrawer);
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && drawer.classList.contains('open')) closeDrawer();
      });

      search.addEventListener('input', function() {
        var q = normalizeForSearch(this.value);
        list.querySelectorAll('.vendor-drawer-item').forEach(function(it) {
          var d = it.getAttribute('data-vendor');
          it.style.display = (!q || normalizeForSearch(d).indexOf(q) >= 0) ? '' : 'none';
        });
      });

      var sortBar = document.getElementById('vendorDrawerSort');
      if (sortBar) {
        sortBar.addEventListener('click', function(e) {
          var btn = e.target.closest('.vds-btn');
          if (!btn) return;
          vendorDrawerSort = btn.getAttribute('data-sort');
          sortBar.querySelectorAll('.vds-btn').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          renderVendorDrawerList();
          if (search.value) search.dispatchEvent(new Event('input'));
        });
      }

      list.addEventListener('click', function(e) {
        var it = e.target.closest('.vendor-drawer-item');
        if (!it) return;
        var vendor = it.getAttribute('data-vendor');
        var base = window.location.href.split('?')[0].split('#')[0];
        window.open(base + '?vendor=' + encodeURIComponent(vendor), '_blank');
        closeDrawer();
      });
    }

    // === Init ===
    document.addEventListener('DOMContentLoaded', function() {
      StockManager.loadFromStorage();

      var viewsetParam = new URLSearchParams(window.location.search).get('viewset');
      var vendorParam = new URLSearchParams(window.location.search).get('vendor');
      if (viewsetParam) {
        initSetView(decodeURIComponent(viewsetParam));
        updateCounterBtn();
      } else if (vendorParam) {
        initVendorView(decodeURIComponent(vendorParam));
        updateCounterBtn();
      } else {
        buildGallery();
        initAccordions();
        initSidebar();
        initSearch();
        initSearchModeToggle();
        initVendorDrawer();
        updateCounterBtn();
        setTimeout(loadAllSectionsForSearch, 1000);
      }
    });

  })();
  </script>
</body>
</html>
